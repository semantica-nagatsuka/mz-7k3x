<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト希望提出</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --accent: #c084fc;
    --accent2: #818cf8;
    --text: #f1f0f5;
    --text-muted: #8b8a99;
    --border: #2e2e3e;
    --danger: #f87171;
    --success: #34d399;
    --radius: 12px;
    --font: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 20px 16px 60px;
  }

  header {
    text-align: center;
    padding: 32px 0 28px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  header p {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .alert {
    background: rgba(248, 113, 113, 0.12);
    border: 1px solid rgba(248, 113, 113, 0.3);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--danger);
    margin-bottom: 20px;
    text-align: center;
    letter-spacing: 0.03em;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }

  input[type="text"],
  input[type="date"],
  select,
  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  input[type="text"]:focus,
  input[type="date"]:focus,
  select:focus,
  textarea:focus {
    border-color: var(--accent);
  }

  textarea {
    resize: none;
    height: 72px;
    font-size: 14px;
  }

  .week-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .week-btn {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-family: var(--font);
    font-size: 13px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }

  .week-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(192, 132, 252, 0.08);
  }

  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .day-card.active {
    border-color: rgba(192, 132, 252, 0.3);
  }

  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    cursor: pointer;
  }

  .day-label {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .day-label span {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 8px;
  }

  .toggle-group {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .toggle-btn {
    padding: 8px 16px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: var(--font);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }

  .toggle-btn:first-child {
    border-right: 1px solid var(--border);
  }

  .toggle-btn.active-work {
    background: rgba(52, 211, 153, 0.15);
    color: var(--success);
  }

  .toggle-btn.active-off {
    background: rgba(248, 113, 113, 0.12);
    color: var(--danger);
  }

  .day-body {
    padding: 0 18px 18px;
    display: none;
  }

  .day-body.show {
    display: block;
  }

  .time-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .time-block label {
    margin-bottom: 6px;
  }

  .time-selects {
    display: flex;
    gap: 6px;
  }

  .time-selects select {
    flex: 1;
    padding: 10px 8px;
    font-size: 14px;
    text-align: center;
  }

  .field {
    margin-bottom: 14px;
  }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-family: var(--font);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.06em;
    margin-top: 20px;
    transition: opacity 0.2s;
  }

  .submit-btn:active {
    opacity: 0.85;
  }

  .confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }

  .confirm-overlay.show {
    display: flex;
  }

  .confirm-sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 28px 24px 40px;
    width: 100%;
    max-width: 480px;
  }

  .confirm-sheet h2 {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }

  .confirm-sheet p {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .confirm-summary {
    background: var(--surface2);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    line-height: 1.8;
    max-height: 200px;
    overflow-y: auto;
  }

  .confirm-btns {
    display: flex;
    gap: 10px;
  }

  .btn-cancel {
    flex: 1;
    padding: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    font-family: var(--font);
    font-size: 15px;
    cursor: pointer;
  }

  .btn-ok {
    flex: 2;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }

  .done-screen {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .done-screen.show {
    display: block;
  }

  .done-icon {
    font-size: 56px;
    margin-bottom: 20px;
  }

  .done-screen h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }

  .done-screen p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
  }

  #main-form { }

  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  .week-info {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 16px;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>

<header>
  <h1>シフト希望提出</h1>
  <p id="header-sub">翌週分のシフト希望を入力してください</p>
</header>

<div id="alert-box" class="alert" style="display:none;"></div>

<div id="main-form">

  <!-- キャスト名 -->
  <div class="card">
    <div class="field">
      <label>キャスト名</label>
      <input type="text" id="cast-name" placeholder="例：さくら" autocomplete="off">
    </div>

    <!-- 対象週 -->
    <div class="field" style="margin-bottom:0;">
      <label>対象週</label>
      <div class="week-selector">
        <button class="week-btn" id="btn-week0" onclick="selectWeek(0)">今週</button>
        <button class="week-btn" id="btn-week1" onclick="selectWeek(1)">来週</button>
      </div>
      <div class="week-info" id="week-range-label"></div>
    </div>
  </div>

  <!-- 日別入力 -->
  <div id="days-container"></div>

  <!-- 週全体備考 -->
  <div class="card">
    <div class="field" style="margin-bottom:0;">
      <label>今週の備考・連絡事項（任意）</label>
      <textarea id="week-note" placeholder="例：○日は遅刻するかもしれません"></textarea>
    </div>
  </div>

  <button class="submit-btn" onclick="openConfirm()">内容を確認して提出する</button>
</div>

<!-- 確認シート -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-sheet">
    <h2>提出内容の確認</h2>
    <p>以下の内容で提出します。よろしければ「提出する」を押してください。</p>
    <div class="confirm-summary" id="confirm-summary"></div>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">戻る</button>
      <button class="btn-ok" onclick="doSubmit()">提出する</button>
    </div>
  </div>
</div>

<!-- 完了画面 -->
<div class="done-screen" id="done-screen">
  <div class="done-icon">✅</div>
  <h2>提出完了</h2>
  <p>シフト希望を受け付けました。<br>お疲れさまです！</p>
</div>

<script>
const DEADLINE_DAY = 3; // 水曜(0=日,1=月...3=水)
const DEADLINE_HOUR = 23;
const DEADLINE_MIN = 59;

const DAYS_JP = ['日', '月', '火', '水', '木', '金', '土'];
const DAYS_FULL = ['日曜', '月曜', '火曜', '水曜', '木曜', '金曜', '土曜'];

let selectedWeek = 1;
let weekStartDate = null;

function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

function formatDate(date) {
  const m = date.getMonth() + 1;
  const d = date.getDate();
  const w = DAYS_JP[date.getDay()];
  return `${m}/${d}（${w}）`;
}

function isPastDeadline() {
  const now = new Date();
  const day = now.getDay();
  const h = now.getHours();
  const m = now.getMinutes();
  if (day > DEADLINE_DAY) return true;
  if (day === DEADLINE_DAY && (h > DEADLINE_HOUR || (h === DEADLINE_HOUR && m >= DEADLINE_MIN))) return true;
  return false;
}

function selectWeek(w) {
  selectedWeek = w;
  document.getElementById('btn-week0').classList.toggle('active', w === 0);
  document.getElementById('btn-week1').classList.toggle('active', w === 1);
  buildDays();
  checkAlert();
}

function checkAlert() {
  const box = document.getElementById('alert-box');
  if (isPastDeadline() && selectedWeek === 0) {
    box.style.display = 'block';
    box.textContent = '⚠️ 締切を過ぎています。入力内容は今週分として処理されます。';
  } else {
    box.style.display = 'none';
  }
}

function buildDays() {
  const now = new Date();
  const thisMonday = getMonday(now);
  const monday = new Date(thisMonday);
  monday.setDate(monday.getDate() + selectedWeek * 7);
  weekStartDate = monday;

  // ラベル
  const sunday = new Date(monday);
  sunday.setDate(sunday.getDate() + 6);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('week-range-label').textContent = `${fmt(monday)}（月）〜 ${fmt(sunday)}（日）`;

  const container = document.getElementById('days-container');
  container.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    container.appendChild(makeDayCard(d, i));
  }
}

function makeDayCard(date, idx) {
  const div = document.createElement('div');
  div.className = 'day-card';
  div.id = `day-${idx}`;

  const dateStr = formatDate(date);
  const dayName = DAYS_FULL[date.getDay()];

  div.innerHTML = `
    <div class="day-header">
      <div class="day-label">${dateStr} <span>${dayName}</span></div>
      <div class="toggle-group">
        <button class="toggle-btn" id="btn-work-${idx}" onclick="setWork(${idx}, true)">出勤</button>
        <button class="toggle-btn" id="btn-off-${idx}" onclick="setWork(${idx}, false)">お休み</button>
      </div>
    </div>
    <div class="day-body" id="body-${idx}">
      <div class="time-row">
        <div class="time-block">
          <label>開始時間</label>
          <div class="time-selects">
            <select id="start-h-${idx}">${buildHours(12,23)}</select>
            <select id="start-m-${idx}">${buildMins()}</select>
          </div>
        </div>
        <div class="time-block">
          <label>終了時間</label>
          <div class="time-selects">
            <select id="end-h-${idx}">${buildHours(13,25)}</select>
            <select id="end-m-${idx}">${buildMins()}</select>
          </div>
        </div>
      </div>
      <div class="field" style="margin-bottom:0;">
        <label>備考（任意）</label>
        <textarea id="note-${idx}" placeholder="例：早めに上がりたい"></textarea>
      </div>
    </div>
  `;
  return div;
}

function buildHours(from, to) {
  let opts = '';
  for (let h = from; h <= to; h++) {
    opts += `<option value="${h}">${h}:00</option>`;
  }
  return opts;
}

function buildMins() {
  return `<option value="00">00</option><option value="30">30</option>`;
}

function setWork(idx, isWork) {
  const card = document.getElementById(`day-${idx}`);
  const body = document.getElementById(`body-${idx}`);
  const btnWork = document.getElementById(`btn-work-${idx}`);
  const btnOff = document.getElementById(`btn-off-${idx}`);

  card.dataset.work = isWork ? '1' : '0';

  if (isWork) {
    card.classList.add('active');
    body.classList.add('show');
    btnWork.classList.add('active-work');
    btnWork.classList.remove('active-off');
    btnOff.classList.remove('active-off');
    btnOff.classList.remove('active-work');
  } else {
    card.classList.remove('active');
    body.classList.remove('show');
    btnOff.classList.add('active-off');
    btnOff.classList.remove('active-work');
    btnWork.classList.remove('active-work');
    btnWork.classList.remove('active-off');
  }
}

function openConfirm() {
  const name = document.getElementById('cast-name').value.trim();
  if (!name) { alert('キャスト名を入力してください'); return; }

  let summary = `【キャスト名】${name}\n`;
  const monday = weekStartDate;
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;

  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    const card = document.getElementById(`day-${i}`);
    const isWork = card.dataset.work === '1';
    const dateStr = `${fmt(d)}（${DAYS_JP[d.getDay()]}）`;
    if (isWork) {
      const sh = document.getElementById(`start-h-${i}`).value;
      const sm = document.getElementById(`start-m-${i}`).value;
      const eh = document.getElementById(`end-h-${i}`).value;
      const em = document.getElementById(`end-m-${i}`).value;
      const note = document.getElementById(`note-${i}`).value.trim();
      summary += `${dateStr}　出勤　${sh}:${sm}〜${eh}:${em}`;
      if (note) summary += `　備考:${note}`;
    } else {
      summary += `${dateStr}　お休み`;
    }
    summary += '\n';
  }

  const weekNote = document.getElementById('week-note').value.trim();
  if (weekNote) summary += `\n【週全体備考】${weekNote}`;

  document.getElementById('confirm-summary').textContent = summary;
  document.getElementById('confirm-overlay').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('show');
}

function doSubmit() {
  const timestamp = new Date().toISOString();
  const name = document.getElementById('cast-name').value.trim();
  const monday = weekStartDate;
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;

  let rows = [];
  const header = ['タイムスタンプ', 'キャスト名', '対象週開始日', '日付', '曜日', '出勤可否', '開始時間', '終了時間', '日別備考', '週全体備考'];
  rows.push(header);

  const weekNote = document.getElementById('week-note').value.trim();
  const weekLabel = `${fmt(monday)}〜`;

  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    const card = document.getElementById(`day-${i}`);
    const isWork = card.dataset.work === '1';
    const dateStr = fmt(d);
    const dayStr = DAYS_FULL[d.getDay()];

    let startTime = '', endTime = '', note = '';
    if (isWork) {
      const sh = document.getElementById(`start-h-${i}`).value;
      const sm = document.getElementById(`start-m-${i}`).value;
      const eh = document.getElementById(`end-h-${i}`).value;
      const em = document.getElementById(`end-m-${i}`).value;
      startTime = `${sh}:${sm}`;
      endTime = `${eh}:${em}`;
      note = document.getElementById(`note-${i}`).value.trim();
    }

    rows.push([
      timestamp, name, weekLabel, dateStr, dayStr,
      isWork ? '出勤' : 'お休み',
      startTime, endTime, note, weekNote
    ]);
  }

  const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `shift_${name}_${fmt(monday).replace('/','')}.csv`;
  a.click();
  URL.revokeObjectURL(url);

  closeConfirm();
  document.getElementById('main-form').style.display = 'none';
  document.getElementById('done-screen').classList.add('show');
}

// 初期化
(function init() {
  const past = isPastDeadline();
  selectedWeek = past ? 1 : 1; // デフォルト来週
  document.getElementById('btn-week1').classList.add('active');
  buildDays();
  checkAlert();
})();
</script>
</body>
</html>
